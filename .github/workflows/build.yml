name: build

on:
  workflow_call:

permissions:
  contents: read
  packages: write   # push the GHCR build cache

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # vendor/ engine sources

      - name: Free runner disk space   # ubuntu-latest has a single 72G disk; the build needs most of it
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: true
          swap-storage: true

      - run: df -h /

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: ref
        run: echo "cache=ghcr.io/${GITHUB_REPOSITORY,,}:buildcache" >> "$GITHUB_OUTPUT"

      - name: Generate .dockerignore
        run: make .dockerignore

      - name: Build + test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: etc/Dockerfile
          target: test
          outputs: type=cacheonly
          cache-from: type=registry,ref=${{ steps.ref.outputs.cache }}
          cache-to: type=registry,ref=${{ steps.ref.outputs.cache }},mode=max

      - name: Build + browser test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: etc/Dockerfile
          target: test-ui
          outputs: type=cacheonly
          cache-from: type=registry,ref=${{ steps.ref.outputs.cache }}

      - name: Export dist/
        uses: docker/build-push-action@v6
        with:
          context: .
          file: etc/Dockerfile
          target: site
          outputs: type=local,dest=dist
          cache-from: type=registry,ref=${{ steps.ref.outputs.cache }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
